# Curated Minecraft sounds → OpenCraft events.
# Import: cargo run -p engine-assets --bin import-sound-pack
#
# MC convention: break/place → dig/* ; mining hit ticks → step/* (see assets/sounds/README.md)

[[events]]
id = "block_break_grass"
kind = "block_break"
sound_group = "grass"
category = "blocks"
pack = "dig/grass"
variants = 4

[[events]]
id = "block_break_dirt"
kind = "block_break"
sound_group = "dirt"
category = "blocks"
pack = "dig/gravel"
variants = 4

[[events]]
id = "block_break_stone"
kind = "block_break"
sound_group = "stone"
category = "blocks"
pack = "dig/stone"
variants = 4

[[events]]
id = "block_break_leaves"
kind = "block_break"
sound_group = "leaves"
category = "blocks"
pack = "dig/grass"
variants = 4
volume = 0.85

