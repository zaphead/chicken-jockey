# Curated Minecraft → engine block mapping.
# Run: cargo run -p engine-assets --bin import-texture-pack -- \
#   --pack source-packs/whimscape-26.1-r2/whimscape-26.1-r2.zip

[colormaps]
grass = "colormap/grass.png"
foliage = "colormap/foliage.png"

[[blocks]]
engine = "grass"
model = "grass_block_alt_1"
tint = "biome_grass"
overlay = true

[[blocks]]
engine = "dirt"
model = "dirt_alt_1"

[[blocks]]
engine = "stone"
model = "stone_alt_1"

[[blocks]]
engine = "leaves"
model = "birch_leaves_alt_1"
draw = "cutout"
tint = "biome_foliage"

[[items]]
engine = "wooden_pickaxe"
pack = "item/wooden_pickaxe"

[[items]]
engine = "dirt"
from_block_top = true

[[items]]
engine = "grass"
from_block_top = true

[[items]]
engine = "stone"
from_block_top = true

[[items]]
engine = "leaves"
from_block_top = true
